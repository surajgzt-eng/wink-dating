services:
  - type: web
    name: wink-dating-bot
    runtime: node
    repo: https://github.com/surajgzt-eng/wink-dating
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wink-dating-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: BOT_USERNAME
        value: wink_dating_bot
      - key: DEV_AUTO_VERIFY
        value: "false"
      - key: DEV_AUTO_PREMIUM
        value: "false"
      - key: HOST
        value: 0.0.0.0

databases:
  - name: wink-dating-db
    databaseName: wink_dating
    plan: free
