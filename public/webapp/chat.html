<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WINK — Chat</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { background: var(--tg-bg, #0f0f15); color: var(--tg-text-color, #fff); font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--tg-section-bg, #1a1a24);
      border-bottom: 1px solid var(--tg-border-color, #333);
    }
    .chat-header img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
    }
    .chat-header .info { flex: 1; }
    .chat-header .name { font-weight: 600; font-size: 16px; }
    .chat-header .sub { font-size: 12px; color: var(--tg-hint-color, #888); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
    }
    .bubble.mine {
      align-self: flex-end;
      background: linear-gradient(135deg, #ff4d8d, #ff8a65);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble.theirs {
      align-self: flex-start;
      background: var(--tg-secondary-bg, #252532);
      border-bottom-left-radius: 4px;
    }
    .bubble .time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      display: block;
    }
    .bubble img {
      max-width: 200px;
      border-radius: 8px;
      margin-top: 4px;
      cursor: pointer;
    }
    .bubble .media {
      max-width: 200px;
      border-radius: 8px;
      margin-top: 4px;
    }
    .bubble.voice .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .bubble.voice audio { display: none; }

    .bubble.meta {
      font-size: 11px;
      opacity: 0.6;
      text-align: center;
      background: none;
      padding: 4px;
    }

    .input-area {
      padding: 12px 16px;
      background: var(--tg-section-bg, #1a1a24);
      border-top: 1px solid var(--tg-border-color, #333);
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .input-area input[type="text"] {
      flex: 1;
      background: var(--tg-secondary-bg, #252532);
      border: 1px solid var(--tg-border-color, #333);
      color: var(--tg-text-color, #fff);
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 15px;
      outline: none;
    }
    .input-area input[type="text"]:focus { border-color: #ff4d8d; }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--tg-secondary-bg, #252532);
      border: none;
      color: var(--tg-text-color, #fff);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .icon-btn:active { background: #333; }
    .icon-btn.send { background: linear-gradient(135deg, #ff4d8d, #ff8a65); }

    .limit-warn {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      color: #f59e0b;
      background: rgba(245, 158, 11, 0.1);
    }

    .attach-menu {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--tg-section-bg, #1a1a24);
      border-radius: 12px;
      padding: 8px;
      display: flex;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 100;
    }
    .attach-menu button {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: var(--tg-secondary-bg, #252532);
      border: none;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .attach-menu button span { font-size: 10px; margin-top: 2px; }

    #imageInput, #voiceInput { display: none; }

    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--tg-hint-color, #888);
      text-align: center;
      padding: 20px;
    }
    .empty-chat .icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="chat-header">
    <img id="matchPhoto" src="" alt="" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><circle cx=%22100%22 cy=%22100%22 r=%2260%22 fill=%22%23ff4d8d%22/></svg>'">
    <div class="info">
      <div class="name" id="matchName">Loading...</div>
      <div class="sub" id="matchStatus"></div>
    </div>
    <button class="icon-btn" onclick="window.history.back()" style="background:none; font-size:20px;">←</button>
  </div>

  <div id="messages" class="chat-messages">
    <div class="empty-chat">
      <div class="icon">💬</div>
      <p>No messages yet.<br>Say hi to start the conversation!</p>
    </div>
  </div>

  <div id="limitWarn" class="limit-warn" style="display:none;"></div>

  <div class="input-area">
    <button class="icon-btn" id="attachBtn" onclick="toggleAttachMenu()">📎</button>
    <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
    <button class="icon-btn send" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

  <div id="attachMenu" class="attach-menu" style="display:none;">
    <button onclick="sendImage()">📷<span>Camera</span></button>
    <button onclick="document.getElementById('imageInput').click()">🖼️<span>Gallery</span></button>
    <button id="voiceBtn" onclick="toggleVoice()">🎤<span>Voice</span></button>
  </div>

  <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
  <input type="file" id="voiceInput" accept="audio/*">

  <script src="nav.js"></script>
  <script>
    const qs = new URLSearchParams(window.location.search);
    const matchId = parseInt(qs.get('matchId') || '0', 10);
    const matchName = qs.get('name') || 'Match';

    document.getElementById('matchName').textContent = matchName;
    let myChatId = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    async function init() {
      try {
        await window.__tgAuth.waitForInitData(5000);
        console.log('InitData loaded');
        const headers = window.__tgAuth.getAuthHeaders();
        console.log('Auth headers:', headers);

        const pr = await fetch(location.origin + '/api/profile', { headers });
        const me = await pr.json();
        console.log('Profile:', me);
        myChatId = me.chatId;

        // Load match info for photo
        if (matchId) {
          const mr = await fetch(location.origin + '/api/matches/' + myChatId, { headers });
          if (mr.ok) {
            const md = await mr.json();
            const match = md.matches?.find(m => m.id === matchId);
            if (match) {
              document.getElementById('matchPhoto').src = match.photo_url || '';
              document.getElementById('matchName').textContent = match.first_name || matchName;
            }
          }
        }

        await loadMessages();
        setInterval(loadMessages, 3000);
      } catch (e) { console.error(e); }
    }

    async function loadMessages() {
      if (!matchId || !myChatId) return;
      try {
        const r = await fetch(location.origin + `/api/messages/${matchId}?chatId=${myChatId}`, { headers: window.__tgAuth.getAuthHeaders() });
        const data = await r.json();
        const wrap = document.getElementById('messages');

        if (!data.messages?.length) {
          wrap.innerHTML = `<div class="empty-chat"><div class="icon">💬</div><p>No messages yet.<br>Say hi to start the conversation!</p></div>`;
          return;
        }

        wrap.innerHTML = '';
        for (const m of data.messages) {
          const div = document.createElement('div');
          const mine = Number(m.sender_id) === Number(myChatId);
          div.className = 'bubble ' + (mine ? 'mine' : 'theirs') + (m.media_type === 'voice' ? ' voice' : '');

          const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          if (m.media_type === 'image' && m.media_url) {
            div.innerHTML = `<img src="${m.media_url}" alt="image" onclick="window.Telegram?.WebApp?.showImageRedir?.(m.media_url)"><span class="time">${time}</span>`;
          } else if (m.media_type === 'voice' && m.media_url) {
            div.innerHTML = `<div class="play-btn" onclick="new Audio('${m.media_url}').play()">🎤 Voice message</div><span class="time">${time}</span>`;
          } else {
            div.innerHTML = `${escapeHtml(m.content || '')}<span class="time">${time}</span>`;
          }

          wrap.appendChild(div);
        }

        wrap.scrollTop = wrap.scrollHeight;
      } catch (e) { console.error('Load messages error:', e); }
    }

    async function sendMessage(content = null, mediaType = 'text', mediaUrl = null) {
      if (!matchId || !myChatId) { showToast('Chat not loaded', true); return; }
      const text = content || document.getElementById('msgInput').value.trim();
      if (!text && !mediaUrl) { showToast('Type something first', true); return; }

      document.getElementById('msgInput').value = '';

      try {
        const r = await fetch(location.origin + '/api/messages/send', {
          method: 'POST',
          headers: { ...window.__tgAuth.getAuthHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ matchId, senderId: myChatId, content: text, mediaType, mediaUrl })
        });
        const data = await r.json();
        console.log('Send response:', r.status, data);

        if (!r.ok || data.error) {
          showToast(data.error || 'Failed to send', true);
          return;
        }
        if (data.needsPremium) {
          const warn = document.getElementById('limitWarn');
          warn.style.display = 'block';
          warn.innerHTML = `Limit reached! <b>Upgrade to Premium</b> or <b>refer friends</b> for more texts!`;
          return;
        }

        await loadMessages();
      } catch (e) { console.error('Send error:', e); showToast('Send failed: ' + e.message, true); }
    }

    function toggleAttachMenu() {
      const menu = document.getElementById('attachMenu');
      menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
    }

    async function sendImage() {
      document.getElementById('attachMenu').style.display = 'none';
      document.getElementById('imageInput').click();
    }

    async function handleImageSelect(event) {
      const file = event.target.files?.[0];
      if (!file) return;

      // For now, just send with a placeholder media_url
      // In production: upload to Telegram API to get file_id
      const reader = new FileReader();
      reader.onload = async (e) => {
        // Show locally first
        await sendMessage('📷 Image', 'image', e.target.result);
      };
      reader.readAsDataURL(file);
      event.target.value = '';
    }

    function toggleVoice() {
      document.getElementById('attachMenu').style.display = 'none';
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onload = async (e) => {
            await sendMessage('🎤 Voice', 'voice', e.target.result);
          };
          reader.readAsDataURL(blob);
        };

        mediaRecorder.start();
        isRecording = true;
        document.getElementById('voiceBtn').style.background = '#ef4444';

        // Auto-stop after 30 seconds
        setTimeout(() => { if (isRecording) stopRecording(); }, 30000);
      } catch (e) {
        console.error('Recording error:', e);
        alert('Microphone access denied');
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('voiceBtn').style.background = '';
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, ch => ({'&':'&','<':'<','>':'>','"':'"',"'":'''}[ch]));
    }

    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    init();
  </script>
</body>
</html>
