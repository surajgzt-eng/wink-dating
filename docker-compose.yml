# Docker Compose for Telegram Dating Bot Database
# Option A: Docker (Recommended for development)

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dating_bot
      POSTGRES_USER: dating_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dating_password_123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: phpPgAdmin for database management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    environment:
      PMA_HOST: postgres
      PMA_USER: dating_user
      PMA_PASSWORD: ${POSTGRES_PASSWORD:-dating_password_123}
      MYSQL_ROOT_PASSWORD: ${POSTGRES_PASSWORD:-dating_password_123}
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Docker network for internal service communication
networks:
  default:
    name: dating_bot_network
